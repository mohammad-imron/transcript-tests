# pytest.ini - configuration for the transcript API test scaffold
[pytest]
minversion = 6.0
addopts = -q --tb=short --strict-markers
testpaths = tests
python_files = test_*.py
markers =
    contract: mark tests as contract-level checks
    integration: mark tests that require the running service
    unit: mark fast unit tests
    performance: mark load/perf tests
    flaky: mark known flaky tests (should be quarantined)
log_cli = true
log_cli_level = INFO
