# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'
  TRANSCRIPT_API_BASE: 'http://localhost:8000'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: |
          flake8 .

  unit-and-contract:
    name: Unit and Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit -q --junitxml=reports/unit.xml
      - name: Run contract tests
        run: pytest tests/contract -q --junitxml=reports/contract.xml
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-contract-reports
          path: reports

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-contract
    services:
      # Optional: start a mock or the real service via docker-compose if provided in repo
      # If your repo includes docker-compose.yml to start the API and dependencies,
      # uncomment the following service and ensure docker-compose is present.
      #
      # api:
      #   image: alpine:3.18
      #   options: >-
      #     --entrypoint /bin/sh
      #     --workdir /github/workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start test services (if docker-compose.yml present)
        if: ${{ always() && (exists('docker-compose.yml') || exists('.github/docker-compose.yml')) }}
        run: |
          docker-compose up -d
          # wait for service to become healthy (basic loop)
          for i in $(seq 1 30); do
            if curl -sSf ${TRANSCRIPT_API_BASE}/health >/dev/null 2>&1; then
              echo "Service is up"
              break
            fi
            echo "Waiting for service..."
            sleep 2
          done
      - name: Run integration tests
        env:
          TRANSCRIPT_API_BASE: ${{ env.TRANSCRIPT_API_BASE }}
        run: |
          pytest tests/integration -q --junitxml=reports/integration.xml
      - name: Tear down test services
        if: ${{ always() && (exists('docker-compose.yml') || exists('.github/docker-compose.yml')) }}
        run: docker-compose down
      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports
          path: reports

  e2e-staging:
    name: E2E on Staging
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run smoke E2E tests against staging
        env:
          TRANSCRIPT_API_BASE: ${{ secrets.STAGING_API_BASE }}
          API_TOKEN: ${{ secrets.STAGING_API_TOKEN }}
        run: |
          pytest tests/e2e -q --maxfail=1 --junitxml=reports/e2e.xml
      - name: Upload e2e reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports

# Helper: exists() is not a native GitHub Actions function. If you want to conditionally run steps
# based on file existence, replace the 'if' checks above with a small shell check step that exits
# non-zero when the file is missing, or use a matrix/job-level approach. The above conditional is
# illustrative; adapt to your repository layout and CI runner capabilities.
